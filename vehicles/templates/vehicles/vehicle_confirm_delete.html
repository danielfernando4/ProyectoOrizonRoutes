{% extends 'base.html' %}

{% block title %}Eliminar Vehículo — Orizon Routes{% endblock %}

{% block content %}
<h1>Eliminar Vehículo</h1>

<p>¿Estás seguro de que deseas eliminar el vehículo "{{ object.brand }} {{ object.model }}" (capacidad: {{ object.capacity }})?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
    <a href="{% url 'vehicles:list' %}" class="btn">Cancelar</a>
</form>
{% endblock %}
