{% extends 'base.html' %}

{% block title %}Contraseña Cambiada — Orizon Routes{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl shadow-lg border border-gray-100 p-8 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-50 mb-4">
            <i class="fas fa-check-circle text-green-500 text-2xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">¡Contraseña Cambiada!</h1>
        <p class="text-gray-500 text-sm mt-2 mb-6">Tu contraseña ha sido restablecida exitosamente.</p>

        <a href="{% url 'users:login' %}"
           class="inline-block bg-gradient-to-r from-blue-600 to-blue-500 text-white font-semibold py-2.5 px-6 rounded-xl hover:from-blue-700 hover:to-blue-600 transition-all duration-200 shadow-md hover:shadow-lg text-sm">
            <i class="fas fa-sign-in-alt mr-2"></i>Iniciar sesión
        </a>
    </div>
</div>
{% endblock %}
